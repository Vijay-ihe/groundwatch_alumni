<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alumni Locations Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a30;
      --text:#e7eefc;
      --muted:#a9b7d1;
      --border:rgba(255,255,255,0.12);
      --shadow: 0 8px 24px rgba(0,0,0,0.35);
      --radius:14px;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header{
      padding: 18px 20px 10px;
    }
    h1{
      margin:0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .sub{
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .wrap{
      padding: 12px 16px 18px;
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .group{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .control{
      display:flex;
      gap:8px;
      align-items:center;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
    }
    .control label{
      font-size: 13px;
      color: var(--muted);
    }
    input[type="text"], select{
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      min-width: 220px;
    }
    select{ min-width: 200px; }
    .checks{
      display:flex;
      gap:14px;
      align-items:center;
      padding: 6px 8px;
    }
    .checks label{
      display:flex;
      gap:8px;
      align-items:center;
      font-size: 13px;
      color: var(--text);
      cursor:pointer;
      user-select:none;
    }
    .status{
      margin-left:auto;
      color: var(--muted);
      font-size: 12px;
      max-width: 520px;
      line-height: 1.2;
    }
    .status a{ color: var(--text); text-decoration: underline; }
    #map{
      margin-top: 12px;
      height: calc(100vh - 170px);
      border-radius: var(--radius);
      overflow:hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: #0a1020;
    }
    .pill{
      display:inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      margin-left: 6px;
      font-size: 12px;
      color: var(--text);
    }
    .leaflet-popup-content{
      margin: 10px 12px;
      line-height: 1.35;
      font-size: 13px;
    }
    .popup-title{
      font-weight: 700;
      margin-bottom: 6px;
    }
    .kv{
      color:#1a1a1a;
    }
    .popup-row{
      margin: 2px 0;
      color:#111;
    }
    .hint{
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Alumni Locations Map</h1>
    <div class="sub">
      Alumni location + job location (toggle). Data loaded from <span id="csvBadge" class="pill">data/alumni.csv</span>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <div class="group">
        <div class="control">
          <label>Search</label>
          <input id="searchBox" type="text" placeholder="Name / country / city / org…" />
        </div>

        <div class="control">
          <label>Program</label>
          <select id="programSelect">
            <option value="">All programs</option>
          </select>
        </div>

        <div class="control checks">
          <label><input type="checkbox" id="showAlumni" checked /> Alumni location</label>
          <label><input type="checkbox" id="showJob" checked /> Job location</label>
        </div>
      </div>

      <div class="status" id="status">
        Loading…
      </div>
    </div>

    <div id="map"></div>
    <div class="hint" id="hint"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    // ====== CONFIG ======
    const CONFIG = {
      csvPath: "data/alumni.csv"
    };

    // ====== MAP INIT ======
    const map = L.map("map", { worldCopyJump: true }).setView([20, 0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const alumniLayer = L.layerGroup().addTo(map);
    const jobLayer = L.layerGroup().addTo(map);

    // ====== UI ======
    const statusEl = document.getElementById("status");
    const hintEl = document.getElementById("hint");
    const programSelect = document.getElementById("programSelect");
    const searchBox = document.getElementById("searchBox");
    const showAlumni = document.getElementById("showAlumni");
    const showJob = document.getElementById("showJob");
    document.getElementById("csvBadge").textContent = CONFIG.csvPath;

    // ====== HELPERS ======
    const norm = (s) => String(s || "").toLowerCase().trim()
      .replace(/[\s\-\/]+/g, "_")
      .replace(/[^\w_]/g, "");

    function parseNum(v){
      if (v === null || v === undefined) return null;
      let s = String(v).trim();
      if (!s) return null;

      // handle comma decimals "12,34"
      if (s.includes(",") && !s.includes(".")) s = s.replace(",", ".");
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    }

    function bestHeader(headers, wantTokens, latLonTokens, avoidTokens){
      let best = null, bestScore = -1;
      for (const h of headers){
        const n = norm(h);
        if (avoidTokens.some(t => n.includes(t))) continue;

        let score = 0;
        for (const t of wantTokens) if (n.includes(t)) score += 3;
        for (const t of latLonTokens) if (n.includes(t)) score += 1;

        if (score > bestScore){
          bestScore = score;
          best = h;
        }
      }
      return bestScore > 0 ? best : null;
    }

    function findColumns(headers){
      const LAT = ["lat", "latitude"];
      const LON = ["lon", "lng", "long", "longitude"];

      // alumni lat/lon
      const alumniLat = bestHeader(headers,
        ["alumni","home","origin","study","residence"],
        LAT,
        ["job","work","employment","employer","company"]
      );
      const alumniLon = bestHeader(headers,
        ["alumni","home","origin","study","residence"],
        LON,
        ["job","work","employment","employer","company"]
      );

      // job lat/lon
      const jobLat = bestHeader(headers,
        ["job","work","employment","employer","company","current"],
        LAT,
        ["alumni","home","origin","study"]
      );
      const jobLon = bestHeader(headers,
        ["job","work","employment","employer","company","current"],
        LON,
        ["alumni","home","origin","study"]
      );

      // common fields
      const program = bestHeader(headers, ["program"], ["program"], []);
      const name = bestHeader(headers, ["name","alumni_name","full_name"], ["name"], []);
      const email = bestHeader(headers, ["email"], ["email"], []);

      return { alumniLat, alumniLon, jobLat, jobLon, program, name, email };
    }

    function buildProgramOptions(rows, programCol){
      if (!programCol) return;
      const set = new Set();
      rows.forEach(r => {
        const v = (r[programCol] ?? "").toString().trim();
        if (v) set.add(v);
      });
      [...set].sort((a,b)=>a.localeCompare(b)).forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        programSelect.appendChild(opt);
      });
    }

    function rowMatchesFilter(row, q, programCol){
      const programVal = programSelect.value;
      if (programVal && programCol){
        const v = (row[programCol] ?? "").toString().trim();
        if (v !== programVal) return false;
      }
      if (!q) return true;

      // search across all columns
      const blob = Object.values(row).join(" ").toLowerCase();
      return blob.includes(q);
    }

    function popupHtml(row, cols, type){
      const title = cols.name ? (row[cols.name] ?? "").toString().trim() : "";
      const program = cols.program ? (row[cols.program] ?? "").toString().trim() : "";
      const email = cols.email ? (row[cols.email] ?? "").toString().trim() : "";

      // Show a few useful columns if present (without needing exact schema)
      const maybeFields = [
        "Country","City","Organization","Organisation","Company","Employer","Job Title","Title","Position",
        "Year","Graduation Year","Cohort","Program","Programme"
      ];

      const headerKeys = Object.keys(row);
      const interesting = [];
      for (const key of headerKeys){
        const nk = norm(key);
        if (nk.includes("lat") || nk.includes("lon") || nk.includes("lng") || nk.includes("long")) continue;
        if (maybeFields.some(m => norm(m) === nk || nk.includes(norm(m)))) {
          const val = (row[key] ?? "").toString().trim();
          if (val) interesting.push([key, val]);
        }
      }

      const locationLabel = (type === "alumni") ? "Alumni location" : "Job location";

      return `
        <div class="popup-title">${title || "Alumni"}</div>
        ${program ? `<div class="popup-row"><b>Program:</b> ${escapeHtml(program)}</div>` : ""}
        ${email ? `<div class="popup-row"><b>Email:</b> ${escapeHtml(email)}</div>` : ""}
        <div class="popup-row"><b>${locationLabel}</b></div>
        ${interesting.slice(0, 10).map(([k,v]) => `<div class="popup-row"><b>${escapeHtml(k)}:</b> ${escapeHtml(v)}</div>`).join("")}
      `;
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clearLayers(){
      alumniLayer.clearLayers();
      jobLayer.clearLayers();
    }

    function render(rows, cols){
      clearLayers();

      const q = searchBox.value.trim().toLowerCase();
      const filtered = rows.filter(r => rowMatchesFilter(r, q, cols.program));

      let alumniCount = 0;
      let jobCount = 0;

      for (const row of filtered){
        if (showAlumni.checked && cols.alumniLat && cols.alumniLon){
          const lat = parseNum(row[cols.alumniLat]);
          const lon = parseNum(row[cols.alumniLon]);
          if (lat !== null && lon !== null){
            alumniCount++;
            L.circleMarker([lat, lon], {
              radius: 6, weight: 2, opacity: 1, fillOpacity: 0.7
            }).bindPopup(popupHtml(row, cols, "alumni")).addTo(alumniLayer);
          }
        }

        if (showJob.checked && cols.jobLat && cols.jobLon){
          const lat = parseNum(row[cols.jobLat]);
          const lon = parseNum(row[cols.jobLon]);
          if (lat !== null && lon !== null){
            jobCount++;
            L.circleMarker([lat, lon], {
              radius: 6, weight: 2, opacity: 1, fillOpacity: 0.7
            }).bindPopup(popupHtml(row, cols, "job")).addTo(jobLayer);
          }
        }
      }

      const totalMarkers = alumniCount + jobCount;

      statusEl.innerHTML = `
        Showing <b>${totalMarkers}</b> markers
        (<b>${alumniCount}</b> alumni, <b>${jobCount}</b> job).
        <span class="pill">Columns: A(${cols.alumniLat || "?"}, ${cols.alumniLon || "?"}) • J(${cols.jobLat || "?"}, ${cols.jobLon || "?"})</span>
        <a href="${new URL(CONFIG.csvPath, document.baseURI).toString()}" target="_blank" rel="noopener">Open CSV</a>
      `;

      // Fit bounds if markers exist
      const all = [];
      alumniLayer.eachLayer(l => all.push(l.getLatLng()));
      jobLayer.eachLayer(l => all.push(l.getLatLng()));
      if (all.length){
        const b = L.latLngBounds(all);
        map.fitBounds(b.pad(0.2));
        hintEl.textContent = "";
      } else {
        hintEl.textContent =
          "No points found. If your CSV opens fine, your latitude/longitude columns may have different names (or values are blank/non-numeric). Check the 'Columns: A(...) • J(...)' hint above.";
      }
    }

    async function loadCsv(){
      const csvUrl = new URL(CONFIG.csvPath, document.baseURI).toString();

      try{
        statusEl.textContent = "Loading CSV…";
        const res = await fetch(csvUrl, { cache: "no-store" });
        if (!res.ok){
          throw new Error(`CSV not found (${res.status}). Expected at: ${csvUrl}`);
        }
        const text = await res.text();
        const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });

        if (parsed.errors && parsed.errors.length){
          console.warn("CSV parse warnings:", parsed.errors);
        }

        const rows = (parsed.data || []).filter(r => Object.keys(r).length > 0);
        if (!rows.length){
          throw new Error("CSV loaded, but it has 0 data rows (check if the header row is correct).");
        }

        const headers = Object.keys(rows[0]);
        const cols = findColumns(headers);

        // If we can't detect any lat/lon columns, stop early with a helpful message
        const hasAnyGeo = (cols.alumniLat && cols.alumniLon) || (cols.jobLat && cols.jobLon);
        if (!hasAnyGeo){
          throw new Error(
            "CSV loaded, but could not detect latitude/longitude columns. " +
            "Rename columns like 'Alumni Latitude', 'Alumni Longitude', 'Job Latitude', 'Job Longitude' (or similar)."
          );
        }

        buildProgramOptions(rows, cols.program);

        // Attach events once
        const rerender = () => render(rows, cols);
        searchBox.addEventListener("input", rerender);
        programSelect.addEventListener("change", rerender);
        showAlumni.addEventListener("change", rerender);
        showJob.addEventListener("change", rerender);

        statusEl.innerHTML = `Loaded <b>${rows.length}</b> rows. Detecting columns…`;
        render(rows, cols);

      } catch (err){
        console.error(err);
        statusEl.innerHTML = `<b style="color:#ffb4b4">Error:</b> ${escapeHtml(err.message)}`;
        hintEl.textContent =
          "Fix: confirm your CSV path and filename (case-sensitive). Then confirm your column names for lat/lon.";
      }
    }

    loadCsv();
  </script>
</body>
</html>
